# We have a conf and classes directory, add to BBPATH
BBPATH =. "${LAYERDIR}:"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*.bb \
            ${LAYERDIR}/recipes-*/*.bbappend"

BBFILE_COLLECTIONS += "xcpng"
BBFILE_PATTERN_xcpng = "^${LAYERDIR}/"
BBFILE_PRIORITY_xcpng = "5"

LAYERSERIES_COMPAT_xcpng = "alma10"

# This should only be incremented on significant changes that will
# cause compatibility issues with other layers
LAYERVERSION_xcpng = "1"

LAYERDEPENDS_xcpng = "dnf-bridge"


# FIXME those should rather be pulled by build-env
HOSTTOOLS += " \
    podman \
    newgidmap newuidmap pasta slirp4netns \
    createrepo_c \
    curl \
"

# Configuration for podman
CONTAINER_ARCH ?= "unset"
CONTAINER_ARCH:x86_64 = "linux/amd64"
CONTAINER_ARCH:x86_64_v2 = "linux/amd64/v2"
CONTAINER_ARCH:aarch64 = "linux/aarch64"


